<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are you mad?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Soft pastel pink */
            color: #4a4a4a;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .container {
            text-align: center;
            position: relative;
            width: 100%;
            height: 200px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s ease;
        }

        #noBtn {
            background-color: #81c784; /* Soft green */
            color: white;
            margin-right: 20px;
        }

        #noBtn:hover {
            background-color: #66bb6a;
            transform: scale(1.05);
        }

        #yesBtn {
            background-color: #e57373; /* Soft red/coral */
            color: white;
            position: absolute;
            left: calc(50% + 20px); 
        }
    </style>
</head>
<body>

    <h1>are you still mad at me :(</h1>

    <div class="container">
        <button id="noBtn" onclick="forgiven()">No</button>
        <button id="yesBtn" onmouseover="runAway()" onclick="runAway()">Yes</button>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');

        function runAway() {
            const padding = 100;
            const maxX = window.innerWidth - yesBtn.offsetWidth - padding;
            const maxY = window.innerHeight - yesBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            yesBtn.style.position = 'fixed';
            yesBtn.style.left = randomX + 'px';
            yesBtn.style.top = randomY + 'px';
        }

        function forgiven() {
            alert("YAYY, I LOVE LOVE LOVE YOU AND YOU CAN STILL BE MAD AT ME BUT ITS FRIDAY AND I MISS YOU AND I WILL BE BETTER AT BEING NICE BECAUSE I WAS NOT NICE AND IM SORRY OKAY IM DONE HAVE A GREAT DAY AT WORK BYE ❤️");
        }
    </script>

</body>
</html>
